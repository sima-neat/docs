name: Vulcan SysDoc

run-name: ${{ github.event.head_commit.message || github.event.pull_request.title || github.ref_name || 'Vulcan SysDoc' }} (${{ github.event_name == 'workflow_dispatch' && inputs.deploy_environment || 'dev' }})

on:
  push:
    branches:
      - vulcan-dev-sysdoc
      - develop
      - main
  workflow_dispatch:
    inputs:
      deploy_environment:
        description: Vulcan sysdoc environment
        required: true
        default: dev
        type: choice
        options:
          - dev
          - stg
          - prod

permissions:
  contents: read
  actions: write
  id-token: write

concurrency:
  group: ${{ github.repository }}-${{ github.workflow }}-${{ github.event_name == 'workflow_dispatch' && inputs.deploy_environment || 'dev' }}
  cancel-in-progress: false

jobs:
  resolve-target:
    name: Resolve Target
    runs-on: ubuntu-latest
    outputs:
      deploy_environment: ${{ steps.target.outputs.deploy_environment }}
    steps:
      - name: Resolve deployment target
        id: target
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            deploy_environment="${{ inputs.deploy_environment }}"
          else
            deploy_environment="dev"
          fi

          case "${deploy_environment}" in
            dev|stg)
              ;;
            prod)
              if [[ "${GITHUB_REF}" != "refs/heads/main" ]]; then
                echo "Production sysdoc deploy is only allowed from refs/heads/main. Current ref: ${GITHUB_REF}" >&2
                exit 1
              fi
              ;;
            *)
              echo "Unsupported deployment environment: ${deploy_environment}" >&2
              exit 1
              ;;
          esac

          echo "deploy_environment=${deploy_environment}" >> "${GITHUB_OUTPUT}"

  resolve-vulcan-config:
    name: Resolve Vulcan Config
    needs: resolve-target
    uses: sima-neat/.github/.github/workflows/vulcan-resolve-config.yml@main
    with:
      vulcan_env: ${{ needs.resolve-target.outputs.deploy_environment }}

  build:
    name: Build Docusaurus
    needs:
      - resolve-target
      - resolve-vulcan-config
    runs-on: [self-hosted, linux, arm64, "vulcan-${{ needs.resolve-target.outputs.deploy_environment }}", sdk-build, "${{ needs.resolve-vulcan-config.outputs.sdk_cache }}", "${{ needs.resolve-vulcan-config.outputs.sysdoc_capacity }}"]
    environment: ${{ needs.resolve-target.outputs.deploy_environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f package-lock.json ]]; then
            npm ci
          else
            npm install
          fi

      - name: Build site
        env:
          SYSDOC_URL: ${{ needs.resolve-vulcan-config.outputs.sysdoc_base_url }}
          SYSDOC_BASE_URL: /
          SYSDOC_STRICT_LINKS: "1"
        shell: bash
        run: |
          set -euo pipefail
          npm run build
          test -f build/index.html

      - name: Upload site artifact
        uses: actions/upload-artifact@v6
        with:
          name: vulcan-sysdoc-site
          path: build/
          if-no-files-found: error
          retention-days: 1

  publish:
    name: Publish SysDoc
    needs:
      - resolve-target
      - resolve-vulcan-config
      - build
    runs-on: ubuntu-latest
    environment: ${{ needs.resolve-target.outputs.deploy_environment }}
    env:
      AWS_REGION: ${{ needs.resolve-vulcan-config.outputs.aws_region }}
      SYSDOC_BUCKET: ${{ needs.resolve-vulcan-config.outputs.sysdoc_bucket }}
      SYSDOC_KMS_KEY_ID: ${{ needs.resolve-vulcan-config.outputs.sysdoc_kms_key_id }}
      SYSDOC_CLOUDFRONT_DISTRIBUTION_ID: ${{ needs.resolve-vulcan-config.outputs.sysdoc_cloudfront_distribution_id }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ needs.resolve-vulcan-config.outputs.aws_region }}
          role-to-assume: ${{ needs.resolve-vulcan-config.outputs.sysdoc_publisher_role_arn }}
          role-session-name: vulcan-sysdoc-${{ github.run_id }}

      - name: Download site artifact
        uses: actions/download-artifact@v7
        with:
          name: vulcan-sysdoc-site
          path: _site

      - name: Publish site to S3
        shell: bash
        run: |
          set -euo pipefail

          bucket="${SYSDOC_BUCKET:-sima-neat-sysdoc-${{ needs.resolve-target.outputs.deploy_environment }}}"
          if [[ -z "${bucket}" ]]; then
            echo "Missing sysdoc bucket. Set VULCAN_SYSDOC_BUCKET for ${{ needs.resolve-target.outputs.deploy_environment }}." >&2
            exit 1
          fi

          s3_args=()
          if [[ -n "${SYSDOC_KMS_KEY_ID:-}" ]]; then
            s3_args+=(--sse aws:kms --sse-kms-key-id "${SYSDOC_KMS_KEY_ID}")
          fi

          aws s3 sync _site/ "s3://${bucket}/" --delete "${s3_args[@]}"

          if [[ -n "${SYSDOC_CLOUDFRONT_DISTRIBUTION_ID:-}" ]]; then
            aws cloudfront create-invalidation \
              --distribution-id "${SYSDOC_CLOUDFRONT_DISTRIBUTION_ID}" \
              --paths "/*"
          fi
